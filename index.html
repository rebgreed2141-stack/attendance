<!-- 初期アプリ、デモ用として制作 -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>園児出席簿</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#4CAF50" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="tabs">
    <button type="button" class="tab active" id="tabInput">入力</button>
    <button type="button" class="tab" id="tabMonth">月間表示</button>
    <button type="button" class="tab" id="tabManage">管理</button>
  </div>

  <div id="screenInput">
    <div class="top-row">
      <input type="date" id="dateInput" />

      <select id="classSelect">
        <option value="">クラスを選択</option>
        <option value="もみじ">もみじ</option>
        <option value="どんぐり">どんぐり</option>
        <option value="こぐま">こぐま</option>
        <option value="りす">りす</option>
        <option value="のうさぎ">のうさぎ</option>
        <option value="かもしか">かもしか</option>
      </select>

      <select id="teacherSelect"></select>
    </div>

    <div id="childList"></div>

    <div class="summary-col">
      <div class="line">出席人数：<span id="presentCount">0</span></div>
      <div class="line">欠席人数：<span id="absentCount">0</span></div>
    </div>
  </div>

  <div id="screenMonth" class="hidden">
    <div class="view-header" id="viewHeader"></div>
    <div class="table-wrap">
      <table id="monthTable"></table>
    </div>
  </div>

  <div id="screenManage" class="hidden">
    <div class="manage-card">
      <div class="manage-title">データ管理</div>
      <div class="manage-buttons">
        <button type="button" class="action-btn" id="backupBtn">バックアップ</button>
        <button type="button" class="action-btn" id="restoreBtn">データ復元</button>
        <button type="button" class="action-btn danger" id="deleteBtn">データ削除</button>
      </div>
      <input type="file" id="restoreFileInput" accept=".zip,.csv" class="hidden" />
      <div class="manage-note">
        バックアップは <strong>attendance_backup_2025.zip</strong> で保存されます。<br>
        復元は ZIP または CSV を読み込みます。ZIP 復元時は既存データをすべて削除して上書きします。
      </div>
      <div id="manageMessage" class="manage-message"></div>
    </div>
  </div>

  <script src="./jszip.min.js"></script>
  <script src="./app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
